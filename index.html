<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>로컬 링크 — Local Link · AI History Curator</title>
<meta name="description" content="어떤 감정으로 역사를 만나볼까요? 감정으로 진입해 서사로 몰입하는 AI 역사 여행."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230f88c4'/><text x='50' y='73' font-size='58' text-anchor='middle' fill='white' font-family='serif' font-weight='bold'>ㄹ</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  /* warm paper editorial palette */
  --paper:#f7f3ec;--paper2:#efe7d9;--card:#fffdf9;--ink:#1b1714;--ink2:#3c352e;
  --gray:#6f685e;--lgray:#766c5e;--line:#e5dccd;--line2:#d8cebc; /* lgray 4.66:1 — WCAG AA */
  /* dual accent: sky (the way / link) + amber (emotion / history) */
  --sky:#0f88c4;--skydk:#0a5f8a;--skysoft:#e4f1f8;
  --amber:#c8631e;--amberdk:#9c4a12;--ambersoft:#f6e8d8;
  --radius:18px;
  --sh-sm:0 1px 2px rgba(27,23,20,.04),0 2px 5px rgba(27,23,20,.06);
  --sh-md:0 2px 4px rgba(27,23,20,.05),0 8px 22px -6px rgba(27,23,20,.14);
  --sh-lg:0 4px 8px rgba(27,23,20,.06),0 22px 50px -12px rgba(27,23,20,.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:var(--paper);line-height:1.72;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.disp{font-family:'Black Han Sans',sans-serif;font-weight:400;letter-spacing:.005em;}
.serif{font-family:'Noto Serif KR',serif;}
html[lang="en"] .disp{font-family:'Noto Sans KR',sans-serif;font-weight:900;letter-spacing:-.02em;}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
:focus-visible{outline:3px solid var(--sky);outline-offset:2px;border-radius:4px;}

/* reveal-on-scroll */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);}
.reveal.in{opacity:1;transform:none;}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(247,243,236,.82);backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line);}
.topbar .row{display:flex;justify-content:space-between;align-items:center;height:66px;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;cursor:pointer;background:none;border:none;padding:0;}
.brand .mk{width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,var(--sky),var(--skydk));color:#fff;display:grid;place-items:center;font-family:'Noto Serif KR';font-weight:900;font-size:17px;box-shadow:var(--sh-sm);}
.brand b{font-size:18px;font-weight:900;letter-spacing:-.01em;}
.brand .tag{font-size:10.5px;font-weight:700;letter-spacing:.14em;color:var(--lgray);text-transform:uppercase;margin-left:2px;}
@media(max-width:540px){.brand .tag{display:none;}}
.top-actions{display:flex;align-items:center;gap:10px;}
.btn-new{border:none;background:var(--ink);color:var(--paper);font-size:13px;font-weight:600;border-radius:10px;padding:10px 16px;transition:.18s;box-shadow:var(--sh-sm);}
.btn-new:hover{background:var(--amber);transform:translateY(-1px);}
.lang{display:flex;border:1.5px solid var(--line2);border-radius:999px;overflow:hidden;flex-shrink:0;background:var(--card);}
.lang button{border:none;background:transparent;font-size:12px;font-weight:800;padding:7px 13px;color:var(--lgray);transition:.18s;letter-spacing:.04em;}
.lang button.on{background:var(--ink);color:var(--paper);}
.lang button:not(.on):hover{color:var(--ink);}

/* ---------- views ---------- */
.view{display:none;}
.view.on{display:block;}

/* ---------- landing / hero ---------- */
.hero{position:relative;overflow:hidden;padding:104px 24px 96px;text-align:center;min-height:calc(100vh - 66px);display:flex;flex-direction:column;justify-content:center;}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(15,136,196,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(15,136,196,.06) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(74% 66% at 50% 42%,#000,transparent);}
.hero-glow{position:absolute;left:50%;top:44%;width:min(720px,92vw);height:440px;transform:translate(-50%,-50%);background:radial-gradient(50% 50% at 50% 50%,rgba(200,99,30,.16),transparent 70%);filter:blur(10px);pointer-events:none;}
.hero>*{position:relative;z-index:2;}
/* 배경 레이어는 항상 글씨 뒤(z-index:0)에 — .hero>* 규칙보다 우선순위 높게 */
.hero>.hero-grid-bg,.hero>.hero-glow{position:absolute;z-index:0;}
.pill{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;font-weight:800;color:var(--skydk);background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:8px 17px;margin:0 auto;box-shadow:var(--sh-sm);letter-spacing:.01em;}
.pill .d{width:7px;height:7px;border-radius:50%;background:var(--sky);box-shadow:0 0 0 4px rgba(15,136,196,.16);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{50%{box-shadow:0 0 0 7px rgba(15,136,196,0);}}
.hero h1{margin-top:26px;font-size:clamp(36px,6.6vw,70px);line-height:1.14;letter-spacing:-.01em;}
html[lang="en"] .hero h1{font-size:clamp(30px,5.4vw,56px);line-height:1.12;}
.hero h1 .sky{color:var(--sky);}
.hero h1 .amb{color:var(--amber);}
.hero .sub{margin-top:22px;font-size:clamp(15px,1.9vw,18px);color:var(--gray);max-width:540px;margin-left:auto;margin-right:auto;}
.searchbox{margin:40px auto 0;max-width:660px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line2);border-radius:20px;padding:9px 9px 9px 22px;box-shadow:var(--sh-lg);text-align:left;transition:.2s;}
.searchbox:focus-within{border-color:var(--sky);box-shadow:var(--sh-lg),0 0 0 4px rgba(15,136,196,.12);}
.searchbox input{flex:1;border:none;outline:none;font-family:inherit;font-size:16.5px;min-width:0;padding:13px 0;background:transparent;color:var(--ink);}
.searchbox input::placeholder{color:var(--lgray);}
.searchbox .go{border:none;border-radius:14px;background:var(--ink);color:var(--paper);font-size:15px;font-weight:700;padding:15px 26px;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:7px;}
.searchbox .go:hover{background:var(--sky);transform:translateY(-1px);}
.search-hint{margin-top:18px;font-size:12.5px;color:var(--lgray);}
.chips{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px;justify-content:center;}
.chip{font-size:12.5px;border:1px solid var(--line2);background:var(--card);color:var(--gray);padding:9px 15px;border-radius:999px;transition:.18s;box-shadow:var(--sh-sm);}
.chip:hover{border-color:var(--sky);color:var(--skydk);background:var(--skysoft);transform:translateY(-2px);}

/* ---------- loading ---------- */
.loading{min-height:calc(100vh - 66px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.ring{width:58px;height:58px;border-radius:50%;border:4px solid var(--paper2);border-top-color:var(--sky);border-right-color:var(--amber);margin-bottom:26px;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .kq{font-family:'Noto Serif KR';font-size:clamp(19px,2.6vw,26px);font-weight:700;max-width:660px;line-height:1.5;}
.loading .sub{margin-top:10px;font-size:14px;color:var(--gray);}
.loading .tags{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:26px;max-width:560px;}
.at{font-size:12.5px;padding:8px 15px;border-radius:999px;background:var(--card);border:1px solid var(--line2);color:var(--skydk);box-shadow:var(--sh-sm);opacity:0;animation:popIn .4s ease forwards;}
.at b{color:var(--ink);}
@keyframes popIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ---------- emotions view ---------- */
.emview{max-width:860px;margin:0 auto;padding:64px 24px 90px;text-align:center;}
.context{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--gray);border:1px solid var(--line2);border-radius:999px;padding:8px 17px;background:var(--card);box-shadow:var(--sh-sm);}
.understood{margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--sh-sm);}
.understood .uh{font-size:11px;font-weight:900;letter-spacing:.2em;color:var(--amberdk);text-transform:uppercase;margin-bottom:11px;}
.uchips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.uchip{font-size:12.5px;background:var(--paper);border:1px solid var(--line2);border-radius:999px;padding:7px 14px;color:var(--gray);}
.uchip b{color:var(--ink);}
.emview h2{margin-top:38px;font-size:clamp(28px,4.2vw,42px);line-height:1.26;letter-spacing:-.01em;}
.emview .sub{margin-top:12px;color:var(--gray);font-size:15px;}
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:38px;}
@media(max-width:640px){.egrid{grid-template-columns:1fr;}}
.emo{position:relative;border:1px solid var(--line2);border-radius:18px;padding:28px 22px;text-align:left;font-size:16px;font-weight:700;line-height:1.5;transition:.2s cubic-bezier(.2,.7,.2,1);color:var(--ink);background:var(--card);box-shadow:var(--sh-sm);overflow:hidden;}
.emo:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sky);opacity:.7;transition:.2s;}
.emo.g{background:var(--card);}
.emo.g:before{background:var(--amber);}
.emo.b{background:var(--card);}
.emo.b:before{background:var(--sky);}
.emo.s{background:linear-gradient(160deg,#152a34,#0f88c4);color:#fff;border-color:transparent;}
.emo.s:before{background:rgba(255,255,255,.5);}
.emo:hover{transform:translateY(-5px);box-shadow:var(--sh-lg);}
.emo:hover:before{width:6px;opacity:1;}
.emo .em{font-size:26px;display:block;margin-bottom:12px;}
html[lang="en"] .emo{font-size:14.5px;}
.em-actions{margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;align-items:center;}
.back-link{background:none;border:none;color:var(--gray);font-size:13.5px;display:inline-flex;align-items:center;gap:6px;padding:8px 6px;transition:.15s;}
.back-link:hover{color:var(--ink);}

/* ---------- detail view ---------- */
.detail{padding:34px 0 80px;}
.detail-hero{border-radius:24px;background:linear-gradient(155deg,#1b1714 0%,#2a2018 55%,#3a2a1a 100%);color:#fff;padding:26px 32px;margin-top:14px;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:var(--sh-lg);}
.detail-hero:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(200,99,30,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(200,99,30,.16) 1px,transparent 1px);background-size:38px 38px;mask-image:radial-gradient(64% 100% at 88% 0%,#000,transparent);}
.detail-hero>*{position:relative;z-index:2;}
@media(max-width:640px){.detail-hero{padding:32px 24px;}}
.dh-region{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:#fff;background:linear-gradient(120deg,var(--amber),var(--amberdk));border-radius:999px;padding:7px 16px;letter-spacing:.02em;}
.detail-hero h1{font-family:'Noto Serif KR';font-weight:900;margin-top:12px;font-size:clamp(21px,2.9vw,33px);line-height:1.3;color:#fff;letter-spacing:-.01em;}
.dh-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.dh-tags span{font-size:12px;border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:6px 14px;color:rgba(255,255,255,.9);background:rgba(255,255,255,.05);}
.demo-note{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#f0d9a0;background:rgba(200,99,30,.18);border:1px solid rgba(240,217,160,.35);border-radius:999px;padding:6px 14px;margin-top:12px;}

.cols{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;margin-top:20px;align-items:start;}
@media(max-width:820px){.cols{grid-template-columns:1fr;}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px 26px;margin-bottom:20px;box-shadow:var(--sh-sm);}
.panel h3{font-size:16.5px;font-weight:900;display:flex;align-items:center;gap:8px;letter-spacing:-.01em;}
.panel .pdesc{font-size:13px;color:var(--gray);margin-top:5px;}

/* story — editorial serif */
.story-hero{position:relative;background:linear-gradient(165deg,var(--ambersoft),var(--paper2));border:1px solid var(--line2);border-radius:var(--radius);padding:24px 26px;margin-bottom:20px;box-shadow:var(--sh-sm);overflow:hidden;}
.story-hero:before{content:"\201C";position:absolute;right:20px;top:0;font-family:'Noto Serif KR';font-size:88px;line-height:1;color:rgba(200,99,30,.14);pointer-events:none;}
.story-hero .sk{font-size:11px;font-weight:900;letter-spacing:.22em;color:var(--amberdk);text-transform:uppercase;position:relative;}
.story-hero h2{font-family:'Noto Serif KR';font-weight:900;margin-top:14px;font-size:clamp(22px,3vw,30px);line-height:1.4;position:relative;}
.story-hero .body{font-family:'Noto Serif KR';font-weight:400;margin-top:18px;font-size:15.5px;line-height:2.05;color:var(--ink2);position:relative;}
.lbox{margin-top:22px;background:var(--card);border:1px solid var(--line2);border-radius:14px;padding:17px 19px;position:relative;}
.lbox .ll{font-size:11px;font-weight:900;color:var(--skydk);letter-spacing:.1em;margin-bottom:7px;text-transform:uppercase;}
.lbox .ltxt{font-family:'Noto Serif KR';font-size:13.5px;color:var(--gray);line-height:1.85;}

/* course nodes with big editorial numbers */
.rnode{display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);align-items:flex-start;}
.rnode:last-child{border-bottom:none;}
.rpin{flex-shrink:0;width:34px;height:34px;border-radius:10px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:'Noto Serif KR';font-weight:900;font-size:15px;box-shadow:var(--sh-sm);}
.rnode:nth-child(even) .rpin{background:linear-gradient(150deg,var(--sky),var(--skydk));}
.rnode:nth-child(odd) .rpin{background:linear-gradient(150deg,var(--amber),var(--amberdk));}
.rinfo b{font-size:15px;font-weight:900;}
.rinfo .addr{font-size:12px;color:var(--lgray);margin-top:2px;}
.rinfo p{font-size:12.5px;color:var(--gray);margin-top:6px;line-height:1.7;}
.rinfo .whyk{font-size:11px;font-weight:900;color:var(--amberdk);letter-spacing:.04em;}
.rimg{width:92px;height:92px;border-radius:10px;background:var(--paper2) center/cover no-repeat;flex-shrink:0;display:none;box-shadow:var(--sh-sm);}
.rimg.show{display:block;}
#map{width:100%;height:440px;border-radius:16px;border:1px solid var(--line2);margin-top:16px;background:var(--paper2);display:grid;place-items:center;color:var(--lgray);font-size:13.5px;text-align:center;padding:0 20px;box-shadow:var(--sh-sm);overflow:hidden;}
/* 하단 2단 행 + 슬림 타임라인 + 하단 액션 */
.grid2{display:grid;grid-template-columns:1.15fr .85fr;gap:20px;align-items:start;}
@media(max-width:820px){.grid2{grid-template-columns:1fr;}}
.panel.slim{padding:16px 22px 10px;}
.panel.slim h3{font-size:14px;}
.actions-row{display:flex;gap:12px;max-width:680px;margin:6px auto 0;}
.actions-row .btn-wide{flex:1;margin-top:0;}

/* transport */
.tp{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh-md);margin-bottom:20px;}
.tp-head{background:linear-gradient(150deg,#1b1714,#2a2018);color:#fff;padding:18px 22px;}
.tp-head h3{font-size:14.5px;font-weight:800;color:#fff;}
.tp-ctx{display:flex;gap:12px;font-size:11.5px;color:rgba(255,255,255,.6);margin-top:5px;}
.wx-row{display:flex;gap:7px;flex-wrap:wrap;padding:16px 20px 0;align-items:center;}
.wx-row .wl{font-size:11.5px;color:var(--gray);margin-right:2px;font-weight:600;}
.wx-btn{font-size:12px;border:1px solid var(--line2);border-radius:999px;background:var(--card);color:var(--gray);padding:7px 13px;transition:.15s;}
.wx-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.tp-best{margin:16px 20px;background:linear-gradient(155deg,var(--skysoft),#fff);border:1px solid rgba(15,136,196,.28);border-radius:15px;padding:18px 19px;}
.tp-best .badge{display:inline-block;font-size:10.5px;font-weight:900;letter-spacing:.06em;background:linear-gradient(120deg,var(--sky),var(--skydk));color:#fff;border-radius:7px;padding:4px 10px;}
.tp-best .bmode{font-size:17px;font-weight:900;margin-top:10px;}
.tp-best .binfo{font-size:13px;color:var(--gray);margin-top:3px;}
.tp-best .breason{font-size:12.5px;color:var(--skydk);margin-top:10px;font-weight:600;}
.tp-opt{display:flex;justify-content:space-between;gap:10px;padding:14px 20px;border-top:1px solid var(--line);font-size:13px;}
.tp-opt .om{font-weight:700;}
.tp-opt .oc{font-weight:900;white-space:nowrap;}
.tp-opt .ot{color:var(--gray);flex:1;text-align:right;}

/* passport */
.pp{background:linear-gradient(160deg,#1b1714,#26313a);color:#fff;border-radius:var(--radius);padding:28px 26px;margin-bottom:20px;box-shadow:var(--sh-md);position:relative;overflow:hidden;}
.pp:after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(15,136,196,.3),transparent 70%);}
.pp>*{position:relative;z-index:2;}
.pp h3{color:#fff;font-size:16.5px;font-weight:900;}
.pp .psub{font-size:12.5px;color:rgba(255,255,255,.55);margin:5px 0 15px;}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden;margin-bottom:10px;}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--sky),#5ec8f2);transition:width .5s cubic-bezier(.2,.7,.2,1);}
.pp-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.pp-row:last-child{border-bottom:none;}
.pp-row .nm{font-size:13.5px;font-weight:700;color:rgba(255,255,255,.72);}
.pp-row .nm.done{color:#7cd0f7;}
.pp-btn{background:rgba(15,136,196,.22);border:1px solid rgba(15,136,196,.5);color:#8ad6f9;border-radius:9px;font-size:12px;font-weight:600;padding:7px 14px;transition:.15s;}
.pp-btn:hover{background:rgba(15,136,196,.4);}
.pp-check{color:#7cd0f7;font-size:18px;}
.textbook-panel .tb{font-size:13.5px;color:var(--gray);line-height:1.9;}
.btn-wide{width:100%;border:none;border-radius:14px;background:linear-gradient(150deg,var(--sky),var(--skydk));color:#fff;font-size:14.5px;font-weight:700;padding:16px;transition:.2s;box-shadow:var(--sh-sm);}
.btn-wide:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.btn-wide.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line2);margin-top:11px;box-shadow:var(--sh-sm);}
.btn-wide.ghost:hover{border-color:var(--ink);}

/* overlay + toast */
.overlay{position:fixed;inset:0;background:rgba(15,12,10,.6);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;}}
.complete-card{background:var(--card);border-radius:24px;max-width:430px;width:100%;padding:42px 32px;text-align:center;border:1px solid var(--line2);box-shadow:var(--sh-lg);animation:rise .35s cubic-bezier(.2,.7,.2,1);}
@keyframes rise{from{opacity:0;transform:translateY(20px) scale(.97);}}
.cc-seal{width:76px;height:76px;border-radius:50%;background:linear-gradient(155deg,var(--ambersoft),var(--skysoft));display:grid;place-items:center;font-size:34px;margin:0 auto 18px;box-shadow:var(--sh-sm);}
.complete-card h2{font-family:'Noto Serif KR';font-weight:900;font-size:25px;}
.complete-card p{font-size:14px;color:var(--gray);margin-top:8px;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-size:13.5px;padding:13px 22px;border-radius:999px;z-index:95;display:flex;gap:8px;align-items:center;box-shadow:var(--sh-lg);animation:rise .3s cubic-bezier(.2,.7,.2,1);}

.footer{border-top:1px solid var(--line);padding:38px 0;margin-top:24px;}
.footer .ft{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--gray);align-items:center;}
.footer b{color:var(--ink);}
.footer .steps{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--lgray);}
.footer .steps i{color:var(--sky);font-style:normal;}

/* ===== 감정 = 테마 (mood theming) ===== */
:root[data-mood="heat"]{--sky:#c0431a;--skydk:#8a2c10;--skysoft:#f4ded3;--amber:#a83214;--amberdk:#761f0b;--ambersoft:#f1d7ca;}
:root[data-mood="bright"]{--sky:#0f88c4;--skydk:#0a5f8a;--skysoft:#e2f0f8;--amber:#0e9488;--amberdk:#0a6b62;--ambersoft:#d7efeb;}
:root[data-mood="calm"]{--sky:#4d6b88;--skydk:#35506b;--skysoft:#e7ecf1;--amber:#7c6a52;--amberdk:#584936;--ambersoft:#ebe3d5;}

/* ===== 스크롤 스토리텔링 ===== */
.story-line{font-family:'Noto Serif KR';font-weight:400;font-size:15px;line-height:1.92;color:var(--ink2);margin-top:10px;}
.story-line:first-of-type{margin-top:14px;}
.pullquote{position:relative;margin:18px 0 2px;padding:14px 18px;border-left:4px solid var(--amber);background:rgba(0,0,0,.025);font-family:'Noto Serif KR';font-weight:700;font-size:15px;line-height:1.68;color:var(--ink);border-radius:0 12px 12px 0;}
.pullquote cite{display:block;margin-top:8px;font-size:12px;font-weight:400;font-style:normal;color:var(--gray);}
.sources{margin-top:14px;font-size:11.5px;color:var(--lgray);line-height:1.7;}

/* ===== 사건의 흐름 (timeline) ===== */
.timeline{display:flex;gap:0;overflow-x:auto;padding:8px 2px 2px;}
.tl-item{flex:1;min-width:140px;position:relative;padding:18px 16px 4px 0;border-top:2px solid var(--line2);}
.tl-item:before{content:"";position:absolute;top:-6px;left:0;width:11px;height:11px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 3px var(--card);}
.tl-y{display:block;font-weight:900;font-size:13px;color:var(--amberdk);}
.tl-t{display:block;font-size:12.5px;color:var(--gray);margin-top:4px;line-height:1.5;}

/* ===== 그때와 지금 (before/after slider) ===== */
.ba{position:relative;height:330px;border-radius:14px;overflow:hidden;box-shadow:var(--sh-sm);user-select:none;touch-action:none;background:var(--paper2);}
.ba-img{position:absolute;inset:0;background-size:cover;background-position:center;}
.ba-old.pending{filter:sepia(.6) contrast(.92) brightness(.9);}
.ba-handle{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.25);pointer-events:none;}
.ba-knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;background:#fff;box-shadow:var(--sh-md);display:grid;place-items:center;font-size:15px;color:var(--ink);}
.ba-range{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:ew-resize;margin:0;}
.ba-label{position:absolute;bottom:14px;font-size:11.5px;font-weight:800;letter-spacing:.04em;color:#fff;background:rgba(0,0,0,.5);padding:6px 12px;border-radius:999px;backdrop-filter:blur(3px);}
.ba-label.then{left:14px;}
.ba-label.now{right:14px;}
.ba-note{font-size:11.5px;color:var(--lgray);margin-top:9px;}

/* ===== 학습 연결 패널 ===== */
.learn .lv{display:flex;gap:6px;flex-wrap:wrap;margin:2px 0 15px;}
.lvbtn{font-size:12px;border:1px solid var(--line2);border-radius:999px;background:var(--card);color:var(--gray);padding:7px 14px;transition:.15s;}
.lvbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.lvbtn:not(.on):hover{border-color:var(--sky);color:var(--skydk);}
.learn .tb{font-size:13.5px;color:var(--gray);line-height:1.9;padding:15px 16px;background:var(--paper);border:1px solid var(--line);border-radius:12px;}
.exam{margin-top:12px;padding:15px 16px;border:1px solid rgba(15,136,196,.28);background:var(--skysoft);border-radius:12px;}
.exam .em-meta{font-size:11px;font-weight:900;letter-spacing:.08em;color:var(--skydk);text-transform:uppercase;}
.exam .em-q{font-size:13px;color:var(--ink2);margin-top:7px;line-height:1.7;}
.kp{list-style:none;margin:16px 0 0;padding:0;}
.kp li{position:relative;font-size:13px;color:var(--ink2);line-height:1.7;padding:8px 0 8px 21px;border-bottom:1px dashed var(--line);}
.kp li:last-child{border-bottom:none;}
.kp li:before{content:"›";position:absolute;left:4px;top:8px;color:var(--amber);font-weight:900;}
.savebtn{width:100%;margin-top:15px;border:1px dashed var(--line2);background:var(--card);color:var(--skydk);font-size:13px;font-weight:700;border-radius:12px;padding:13px;transition:.15s;}
.savebtn:hover{border-color:var(--sky);background:var(--skysoft);}

/* ===== 신뢰 배지 (다크 히어로 위) ===== */
.fact-badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;border-radius:999px;padding:7px 14px;margin-top:18px;margin-left:8px;}
.fact-badge.confirmed{color:#8fe0ac;background:rgba(60,180,110,.16);border:1px solid rgba(120,220,160,.35);}
.fact-badge.theory{color:#f0cf8a;background:rgba(200,150,40,.16);border:1px solid rgba(240,210,140,.35);}

@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;scroll-behavior:auto!important;}
  .reveal,.at{opacity:1!important;transform:none!important;} /* 애니메이션 꺼도 내용은 보이게 */
}
</style>

/* ================= reveal-on-scroll ================= */
const _revObs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");_revObs.unobserve(e.target);}});
},{threshold:.12,rootMargin:"0px 0px -6% 0px"});
function revealScan(){requestAnimationFrame(()=>$$(".reveal:not(.in)").forEach((el,i)=>{el.style.transitionDelay=(Math.min(i,6)*70)+"ms";_revObs.observe(el);}));}

/* ================= view router ================= */
function setView(id){
  $$(".view").forEach(v=>v.classList.remove("on"));
  $("#view-"+id).classList.add("on");
  window.scrollTo({top:0,behavior:"smooth"});
  revealScan();
}

/* ================= intent parsing (STEP 0) ================= */
function parseQuery(q){
  const d=D(),out=[];
  const scan=(map,dim)=>{for(const k in map){if(q.toLowerCase().includes(k)){out.push({dim,label:map[k]});break;}}};
  scan(d.whoMap,"who");scan(d.whenMap,"when");scan(d.moodMap,"mood");
  return out;
}

/* ================= statics render ================= */
function renderStatics(){
  const d=D();
  $$("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(typeof d[k]==="string")el.innerHTML=d[k];});
  $("#searchInput").placeholder=d.searchPh;
  $("#quickChips").innerHTML=d.chips.map(c=>`<button class="chip">↳ ${c}</button>`).join("");
  $$("#quickChips .chip").forEach(b=>b.addEventListener("click",()=>{$("#searchInput").value=b.textContent.replace(/^↳\s*/,"");doSearch();}));
}
function applyLang(next){
  lang=next;document.documentElement.lang=next;
  $("#btnKo").classList.toggle("on",next==="ko");$("#btnEn").classList.toggle("on",next==="en");
  $("#btnKo").setAttribute("aria-pressed",next==="ko");$("#btnEn").setAttribute("aria-pressed",next==="en");
  renderStatics();
  if($("#view-detail").classList.contains("on")&&state.course)renderDetail();
  else if($("#view-emotions").classList.contains("on"))showEmotions(); // 감정 화면도 새 언어로 재렌더
}

/* ================= flow: landing → searching → emotions ================= */
function doSearch(){
  const q=$("#searchInput").value.trim();
  if(!q){$("#searchInput").focus();return;}
  state.query=q;state.detected=parseQuery(q);
  const d=D();
  $("#loadingQ").textContent=`"${q}"`;
  $("#loadingSub").textContent=d.searching;
  $("#loadingTags").innerHTML=(state.detected.length?state.detected:[null]).map((t,i)=>
    t?`<span class="at" style="animation-delay:${.2+i*.15}s">${d.dims[t.dim]} · <b>${esc(t.label)}</b></span>`
     :`<span class="at" style="animation-delay:.3s">${d.searchingAll}</span>`).join("");
  setView("loading");
  const myGen=++gen;
  setTimeout(()=>{if(myGen===gen)showEmotions();},1600); // 홈으로 돌아갔으면 무시
}
function showEmotions(){
  const d=D();
  document.documentElement.removeAttribute("data-mood");
  $("#emContext").textContent=`◎ "${state.query}"`;
  const u=$("#understood");
  if(state.detected.length){
    u.style.display="block";
    $("#uchips").innerHTML=state.detected.map(t=>`<span class="uchip">${d.dims[t.dim]} · <b>${esc(t.label)}</b></span>`).join("");
  }else u.style.display="none";
  renderEgrid();
  setView("emotions");
}
function renderEgrid(){
  const d=D();
  const idx=[...Array(9).keys()].sort(()=>Math.random()-.5).slice(0,3);
  $("#egrid").innerHTML=idx.map(i=>{const[em,t,cls]=d.emotions[i];
    return `<button class="emo ${cls}" data-pick="${i}"><span class="em">${em}</span><span>${t}</span></button>`;}).join("");
  $$("#egrid [data-pick]").forEach(b=>b.addEventListener("click",()=>pickEmotion(+b.dataset.pick)));
}

/* ===== 옛 사진 큐레이션 =====
 * 장소명(searchKeyword/name/title 중 하나)을 키로, 확실한 공개 도메인 옛 사진을 매핑한다.
 * applyOld()가 자동으로 spot.oldImage/oldCaption/oldSource에 붙인다.
 * 새 사진 추가: 아래 형식으로 한 줄씩. 출처는 반드시 저작권이 만료됐거나 공개된 것만.
 *   소스 추천: 국사편찬위 전자사료관(db.history.go.kr), 국가유산청 국가유산포털(heritage.go.kr),
 *              서울역사아카이브(museum.seoul.go.kr), 국립중앙박물관 e뮤지엄(emuseum.go.kr), Wikimedia Commons */
const OLD_IMAGES={
  "동학농민혁명기념관":{
    url:"https://upload.wikimedia.org/wikipedia/commons/7/73/Jeon_Bong-jun.JPG",
    caption:"1894년 전봉준 — 동학농민운동 기록사진",
    source:"Wikimedia Commons · 공개 도메인",
  },
  // "만석보유지":{ url:"...", caption:"...", source:"..." },
  // "황토현":{ url:"...", caption:"...", source:"..." },
};
function findOldImage(sp){
  return OLD_IMAGES[sp.searchKeyword]||OLD_IMAGES[sp.name]||OLD_IMAGES[sp.title]||null;
}
const SEOUL={x:126.9780,y:37.5665};

/* 큐레이션된 옛 사진을 spot에 붙인다 */
function applyOld(s){
  const old=findOldImage(s);
  if(old&&!s.oldImage){s.oldImage=old.url;s.oldCaption=old.caption;s.oldSource=old.source;}
  return s;
}
/* 역사 여행지로 인정할 TourAPI 타입: 관광지·문화시설만 (숙박32·음식39·쇼핑38 등 상업시설 제외)
 * 영문 서비스는 타입 코드가 다름: 76 관광지 · 78 문화시설 */
const HERITAGE_TYPES=()=>lang==="en"?["76","78"]:["12","14"];
const ATTRACT_TYPE=()=>lang==="en"?"76":"12";
const normName=(s)=>String(s||"").replace(/[\s()\[\]·\-‐–—'"「」『』]/g,"").toLowerCase();
/* 후보 중 "진짜 그 장소"만 고른다: ①관광지/문화시설 타입 ②제목이 검색어와 실제로 겹침 */
function pickHit(items,kw){
  const k=normName(kw);
  const ok=HERITAGE_TYPES();
  const cands=items.filter(it=>!isNaN(it.mapX)&&ok.includes(String(it.contentTypeId)));
  return cands.find(it=>normName(it.title)===k)                                        // 정확 일치
      || cands.find(it=>{const t=normName(it.title);return t.includes(k)||k.includes(t);}) // 부분 포함
      || null;                                                                          // 못 찾으면 실패 (엉뚱한 곳 금지)
}
/* AI 후보 한 곳을 TourAPI로 검증·보강. 매칭되면 _tour=true */
async function enrichOne(sp){
  try{
    const kw=sp.searchKeyword||sp.name;
    // arrange=A(제목순): 기본값 O는 "이미지 있는 항목만" 반환해 사진 없는 실제 유적이 누락됨
    const r=await fetch(`/api/tour?op=keyword&keyword=${encodeURIComponent(kw)}&arrange=A&lang=${lang}`);
    if(!r.ok)throw 0;
    const {items=[]}=await r.json();
    const hit=pickHit(items,kw);
    if(!hit)throw 0;
    const merged={...sp,_tour:true};
    for(const [k,v] of Object.entries(hit)){
      if(v===""||v==null)continue;
      if(typeof v==="number"&&isNaN(v))continue;
      merged[k]=v;
    }
    merged.title=hit.title||sp.title||sp.name;
    return applyOld(merged);
  }catch{
    return applyOld({...sp,title:sp.title||sp.name,_tour:false});
  }
}
/* 지역명에서 시·군 키워드 추출 (예: "전북 정읍" → "정읍") */
function regionKeyword(region){
  const parts=String(region||"").trim().split(/\s+/);
  return parts[parts.length-1]||"";
}
/* TourAPI 그라운딩: AI가 준 후보를 검증하고 실제 존재하는 장소만 남긴다.
 * 2곳 미만이면 그 지역(TourAPI)의 실제 장소로 채운다 → 모든 표시 장소가 TourAPI에 존재 보장. */
async function groundSpots(course){
  const cand=(course.spots||[]).slice(0,5);
  const enriched=await Promise.all(cand.map(enrichOne));
  const matched=enriched.filter(s=>s._tour&&!isNaN(parseFloat(s.mapX)));
  if(matched.length<2){
    const kw=regionKeyword(course.region);
    if(kw){
      try{
        // 지역 채우기도 관광지(12)만 — 모텔·식당이 코스에 끼는 것 방지
        const r=await fetch(`/api/tour?op=keyword&keyword=${encodeURIComponent(kw)}&contentTypeId=${ATTRACT_TYPE()}&lang=${lang}`);
        const {items=[]}=await r.json();
        const seen=new Set(matched.map(s=>s.title));
        for(const it of items){
          if(matched.length>=3)break;
          if(!it.title||seen.has(it.title)||isNaN(it.mapX))continue;
          if(!HERITAGE_TYPES().includes(String(it.contentTypeId)))continue;
          seen.add(it.title);
          matched.push(applyOld({name:it.title,title:it.title,searchKeyword:it.title,
            why:lang==="en"?`A nearby historic site around ${kw}, connected to this story.`:`${kw} 일대에서 이 이야기와 이어지는 장소.`,mapX:it.mapX,mapY:it.mapY,
            addr:it.addr,image:it.image,tel:it.tel,contentId:it.contentId,_tour:true}));
        }
      }catch{}
    }
  }
  // 매칭이 하나도 없으면(키 없음/네트워크 실패) 원본(데모 좌표 포함) 유지
  return (matched.length?matched:enriched).slice(0,4);
}

async function pickEmotion(i){
  const d=D();
  const emoText=d.emotions[i][1].replace(/<br\/>/g," ");
  state.emotion=emoText;
  document.documentElement.dataset.mood=MOODCLS[d.emotions[i][2]]||""; // 감정 = 테마
  $("#loadingQ").textContent=`${d.emotions[i][0]} ${emoText}`;
  $("#loadingSub").textContent=d.generatingSub;
  $("#loadingTags").innerHTML="";
  setView("loading");
  await generateAndRender(++gen);
}

/* 이야기·장소 생성 → TourAPI 보강 → 상세 렌더 (감정선택·난이도변경 공용)
 * myGen: 세대 토큰 — goHome/새 요청이 발생하면 낡은 흐름은 조용히 중단
 * keepOnFail: 난이도 변경처럼 기존 코스가 있을 때, AI 실패 시 DEMO로 덮지 않고 유지 */
async function generateAndRender(myGen,keepOnFail){
  let course,isDemo=false;
  try{
    const r=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:state.query,emotion:state.emotion,lang,level:state.level})});
    if(!r.ok)throw 0;
    course=await r.json();
    if(!course.title||!Array.isArray(course.spots)||!course.spots.length)throw 0;
  }catch{
    if(keepOnFail&&state.course&&!state.isDemo){if(myGen===gen)toast(D().aiRetry);return;}
    course=DEMO;isDemo=true;
  }
  if(myGen!==gen)return;

  // TourAPI 그라운딩: 실제 존재하는 장소만 남기고, 부족하면 지역 목록으로 채운다
  let spots=await groundSpots(course);
  if(myGen!==gen)return;

  state.course=course;state.isDemo=isDemo;state.spots=spots;
  state.stamps=spots.map(()=>false);state.dir=null;

  renderDetail();
  setView("detail");

  // 길찾기 (부가) — 카카오모빌리티
  const mappable=spots.filter(s=>!isNaN(parseFloat(s.mapX)));
  if(mappable.length){
    try{
      const t=mappable[0];
      const r=await fetch(`/api/directions?originX=${SEOUL.x}&originY=${SEOUL.y}&destX=${t.mapX}&destY=${t.mapY}`);
      const j=await r.json();
      if(myGen!==gen)return;
      if(j.found){state.dir=j;renderTransport();}
    }catch{}
  }
}

/* 난이도 변경: AI 연결 시 다시 생성(실패해도 기존 코스 유지), 데모면 안내만 */
function changeLevel(lv){
  if(lv===state.level)return;
  state.level=lv;
  const d=D();
  if(state.isDemo){renderDetail();toast(d.levelDemo);}
  else{toast(d.levelRewrite);generateAndRender(++gen,true);}
}

/* 옛날↔현재 비교 슬라이더 초기화 */
function initBA(){
  $$("[data-ba]").forEach(ba=>{
    const old=ba.querySelector(".ba-old"),handle=ba.querySelector(".ba-handle"),range=ba.querySelector(".ba-range");
    if(!old||!range)return;
    const set=v=>{old.style.clipPath=`inset(0 ${100-v}% 0 0)`;handle.style.left=v+"%";};
    set(+range.value);
    range.addEventListener("input",()=>set(+range.value));
  });
}

                <p><span class="whyk">${d.whyLabel}</span><br/>${esc(s.why||"")}</p>
              </div>
              ${s.image?`<div class="rimg show" style="background-image:url('${safeUrl(s.image)}')"></div>`:""}
            </div>`).join("")}
        </div>
      </div>
    </div>
    <div class="grid2">
      <div class="panel learn reveal">
        <h3>${d.learnH}</h3>
        <div class="lv" id="lvRoot">${d.levels.map(([id,label])=>`<button class="lvbtn${state.level===id?" on":""}" data-lv="${id}">${label}</button>`).join("")}</div>
        ${c.textbook?`<div class="tb">${esc(c.textbook)}</div>`:""}
        ${c.exam?`<div class="exam"><div class="em-meta">${d.examH}${c.exam.meta?` · ${esc(c.exam.meta)}`:""}</div><div class="em-q">${esc(c.exam.q||"")}</div></div>`:""}
        ${c.keyPoints&&c.keyPoints.length?`<ul class="kp">${c.keyPoints.map(k=>`<li>${esc(k)}</li>`).join("")}</ul>`:""}
      </div>
      <div class="pp reveal" id="ppRoot"></div>
    </div>
    ${mappable.length?`
    <div class="grid2">
      <div class="panel reveal">
        <h3>${d.mapH}</h3>
        <div id="map">${d.mapFallback}</div>
      </div>
      <div id="tpRoot" class="reveal"></div>
    </div>`:`<div id="tpRoot" class="reveal"></div>`}
    <div class="actions-row reveal">
      <button class="btn-wide" id="otherEmotionBtn">${d.otherEmotion}</button>
      <button class="btn-wide ghost" id="newSearchBtn2">${d.newSearch2}</button>
    </div>`;
  renderTransport();renderPassport();initBA();
  if(mappable.length)drawMap(mappable);
  $$("#lvRoot [data-lv]").forEach(b=>b.addEventListener("click",()=>changeLevel(b.dataset.lv)));
  $("#otherEmotionBtn").addEventListener("click",()=>{renderEgrid();setView("emotions");});
  $("#newSearchBtn2").addEventListener("click",goHome);
  revealScan(); // 재렌더(난이도·언어 변경) 시에도 reveal 요소가 보이도록
}

function renderTransport(){
  const d=D(),root=$("#tpRoot");if(!root)return;
  const dest=state.course?.region||"";
  const bad=state.weather==="rain"||state.weather==="snow";
  const car=state.dir;
  const carInfo=car?`${d.liveRoute} · ${Math.floor(car.durationMin/60)}h ${car.durationMin%60}m · ${car.distanceKm}km`:``;
  const carCost=car?`${d.toll} ₩${(car.tollFare||0).toLocaleString()}`:``;
  const best=bad?{mode:d.ktx,info:lang==="ko"?"기상 악화 시 정시성이 가장 좋아요":"Most reliable in bad weather",cost:""}:
                 {mode:d.car,info:carInfo,cost:carCost};
  root.innerHTML=`
    <div class="tp">
      <div class="tp-head"><h3>${d.tpH}</h3><div class="tp-ctx"><span>${d.tpFrom}</span><span>📍 ${esc(dest)}${d.tpDest}</span></div></div>
      <div class="wx-row"><span class="wl">${d.wl}</span>
        ${d.weathers.map(([id,label])=>`<button class="wx-btn${state.weather===id?" on":""}" data-wx="${id}">${label}</button>`).join("")}
      </div>
      <div class="tp-best">
        <span class="badge">${d.badge}</span>
        <div class="bmode">${best.mode}</div>
        ${best.info?`<div class="binfo">${best.info}</div>`:""}
        ${best.cost?`<div class="binfo">${best.cost}</div>`:""}
        <div class="breason">💡 ${bad?d.carReasonBad:d.carReasonClear}</div>
      </div>
      ${bad&&car?`<div class="tp-opt"><span class="om">${d.car}</span><span class="ot">${carInfo}</span><span class="oc">${carCost}</span></div>`:""}
      ${!bad?`<div class="tp-opt"><span class="om">${d.ktx}</span><span class="ot"></span><span class="oc"></span></div>`:""}
      <div class="tp-opt"><span class="om">${d.bus}</span><span class="ot"></span><span class="oc"></span></div>
    </div>`;
  $$("#tpRoot [data-wx]").forEach(b=>b.addEventListener("click",()=>{state.weather=b.dataset.wx;renderTransport();}));
}

function renderPassport(){
  const d=D(),root=$("#ppRoot");if(!root)return;
  const n=state.stamps.filter(Boolean).length,total=state.spots.length;
  root.innerHTML=`
    <h3>${d.ppH}</h3>
    <p class="psub">${n}/${total} — ${n<total?d.ppLeft(n,total):d.ppDone}</p>
    <div class="progress"><span style="width:${(n/total)*100}%"></span></div>
    ${state.spots.map((s,i)=>`
      <div class="pp-row">
        <span class="nm ${state.stamps[i]?"done":""}">${esc(s.title||s.name)}</span>
        ${state.stamps[i]?`<span class="pp-check">✔</span>`:`<button class="pp-btn" data-stamp="${i}">${d.verify}</button>`}
      </div>`).join("")}`;
  $$("#ppRoot [data-stamp]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.stamp;
    state.stamps[i]=true;
    toast(D().verified(state.spots[i].title||state.spots[i].name));
    renderPassport();
    if(state.stamps.every(Boolean))setTimeout(showComplete,450);
  }));
}

function showComplete(){
  const d=D();
  $("#overlayRoot").innerHTML=`
    <div class="overlay" id="ov">
      <div class="complete-card" role="dialog" aria-modal="true" aria-label="${d.ccH}">
        <div class="cc-seal">🏆</div>
        <span style="font-size:11px;letter-spacing:.24em;color:var(--skydk);font-weight:900;">${d.ccKicker}</span>
        <h2 style="margin-top:10px;">${d.ccH}</h2>
        <p>${d.ccP(state.course?.title||"")}</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap;">
          <button class="btn-wide" style="width:auto;padding:14px 22px;" id="ccOther">${d.otherEmotion}</button>
          <button class="btn-wide ghost" style="width:auto;padding:14px 22px;margin-top:0;" id="ccHome">${d.newSearch2}</button>
        </div>
      </div>
    </div>`;
  const closeOv=()=>{$("#overlayRoot").innerHTML="";document.removeEventListener("keydown",ovKey);};
  const ovKey=(e)=>{if(e.key==="Escape")closeOv();};
  document.addEventListener("keydown",ovKey);
  $("#ov").addEventListener("click",e=>{if(e.target.id==="ov")closeOv();});
  $("#ccOther").addEventListener("click",()=>{closeOv();renderEgrid();setView("emotions");});
  $("#ccHome").addEventListener("click",()=>{closeOv();goHome();});
  $("#ccOther").focus(); // 다이얼로그로 포커스 이동
}

let toastTimer=null;
function toast(msg){
  $("#toastRoot").innerHTML=`<div class="toast">✔ ${esc(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>$("#toastRoot").innerHTML="",2200);
}

function goHome(){
  ++gen; // 진행 중인 검색 타이머·AI 흐름 무효화
  state={query:"",detected:[],emotion:"",level:"high",course:null,isDemo:false,spots:[],stamps:[],weather:"clear",dir:null};
  document.documentElement.removeAttribute("data-mood");
  $("#searchInput").value="";
  setView("landing");
}

/* ================= Kakao Map ================= */
let kakaoReady=null;
function loadKakao(){
  if(kakaoReady)return kakaoReady;
  kakaoReady=fetch("/api/config").then(r=>r.json()).then(({kakaoJsKey})=>{
    if(!kakaoJsKey)throw new Error("no-key");
    return new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoJsKey}&autoload=false`;
      s.onload=()=>kakao.maps.load(res);s.onerror=rej;
      document.head.appendChild(s);
    });
  });
  return kakaoReady;
}
function drawMap(spots){
  loadKakao().then(()=>{
    const el=$("#map");if(!el)return;
    el.textContent="";
    const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(spots[0].mapY,spots[0].mapX),level:8});
    const bounds=new kakao.maps.LatLngBounds();
    spots.forEach((s,i)=>{
      const pos=new kakao.maps.LatLng(s.mapY,s.mapX);
      new kakao.maps.Marker({map,position:pos});
      new kakao.maps.CustomOverlay({map,position:pos,yAnchor:2.5,
        content:`<div style="background:#1b1714;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:7px;font-family:'Noto Sans KR';box-shadow:0 4px 10px rgba(0,0,0,.25)">${i+1}. ${esc(s.title)}</div>`});
      bounds.extend(pos);
    });
    if(spots.length>1)map.setBounds(bounds,60,60,60,60);
  }).catch(()=>{});
}

$("#btnEn").addEventListener("click",()=>applyLang("en"));
renderStatics();
revealScan();
