<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>로컬 링크 — Local Link · AI History Curator</title>
<meta name="description" content="어떤 감정으로 역사를 만나볼까요? 감정으로 진입해 서사로 몰입하는 AI 역사 여행."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%231fa2de'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>L</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#141414;--gray:#6d6d6d;--lgray:#9a9a9a;
  --sky:#1fa2de;--skydk:#0e6c97;--skybg:#e8f5fc;
  --beige:#f3eee4;--cardgray:#f4f4f4;--rule:#e3e3e3;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:#fff;line-height:1.7;-webkit-font-smoothing:antialiased;}
.disp{font-family:'Black Han Sans',sans-serif;font-weight:400;letter-spacing:.01em;}
html[lang="en"] .disp{font-family:'Noto Sans KR',sans-serif;font-weight:900;letter-spacing:-.02em;}
.wrap{max-width:1060px;margin:0 auto;padding:0 24px;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
button:focus-visible,input:focus-visible{outline:3px solid var(--sky);outline-offset:2px;}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);}
.topbar .row{display:flex;justify-content:space-between;align-items:center;height:62px;gap:10px;}
.brand{display:flex;align-items:center;gap:9px;flex-shrink:0;cursor:pointer;background:none;border:none;padding:0;}
.brand .mk{width:30px;height:30px;border-radius:8px;background:var(--sky);color:#fff;display:grid;place-items:center;font-family:'Black Han Sans';font-size:15px;}
.brand b{font-size:17px;font-weight:900;}
.top-actions{display:flex;align-items:center;gap:10px;}
.btn-new{border:none;background:var(--ink);color:#fff;font-size:13px;font-weight:500;border-radius:9px;padding:9px 15px;transition:.18s;}
.btn-new:hover{background:#333;}
.lang{display:flex;border:1.5px solid var(--rule);border-radius:999px;overflow:hidden;flex-shrink:0;}
.lang button{border:none;background:#fff;font-size:12px;font-weight:700;padding:7px 13px;color:var(--lgray);transition:.18s;letter-spacing:.04em;}
.lang button.on{background:var(--ink);color:#fff;}
.lang button:not(.on):hover{color:var(--ink);}

/* ---------- views ---------- */
.view{display:none;}
.view.on{display:block;}

/* ---------- landing ---------- */
.hero{position:relative;overflow:hidden;padding:110px 24px 100px;text-align:center;min-height:calc(100vh - 62px);display:flex;flex-direction:column;justify-content:center;}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(31,162,222,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(31,162,222,.07) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(70% 70% at 50% 30%,#000,transparent);}
.hero>*{position:relative;z-index:2;}
.pill{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--skydk);background:var(--skybg);border:1px solid rgba(31,162,222,.3);border-radius:999px;padding:7px 16px;margin:0 auto;}
.pill .d{width:7px;height:7px;border-radius:50%;background:var(--sky);}
.hero h1{margin-top:24px;font-size:clamp(34px,6.4vw,64px);line-height:1.2;}
html[lang="en"] .hero h1{font-size:clamp(28px,5.2vw,52px);line-height:1.16;}
.hero h1 .sky{color:var(--sky);}
.hero .sub{margin-top:18px;font-size:clamp(14.5px,1.9vw,17px);color:var(--gray);max-width:520px;margin-left:auto;margin-right:auto;}
.searchbox{margin:38px auto 0;max-width:640px;display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--ink);border-radius:16px;padding:8px 8px 8px 20px;box-shadow:6px 6px 0 var(--sky);text-align:left;}
.searchbox input{flex:1;border:none;outline:none;font-family:inherit;font-size:16px;min-width:0;padding:12px 0;background:transparent;}
.searchbox input::placeholder{color:var(--lgray);}
.searchbox .go{border:none;border-radius:11px;background:var(--ink);color:#fff;font-size:14.5px;font-weight:700;padding:14px 22px;transition:.2s;white-space:nowrap;}
.searchbox .go:hover{background:var(--sky);}
.search-hint{margin-top:14px;font-size:12.5px;color:var(--lgray);}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;justify-content:center;}
.chip{font-size:12.5px;border:1px solid var(--rule);background:#fff;color:var(--gray);padding:8px 14px;border-radius:999px;transition:.18s;}
.chip:hover{border-color:var(--sky);color:var(--skydk);background:var(--skybg);}

/* ---------- loading ---------- */
.loading{min-height:calc(100vh - 62px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.ring{width:56px;height:56px;border-radius:50%;border:4px solid var(--skybg);border-top-color:var(--sky);margin-bottom:24px;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading .kq{font-size:clamp(18px,2.6vw,24px);font-weight:900;max-width:640px;}
.loading .sub{margin-top:8px;font-size:14px;color:var(--gray);}
.loading .tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:24px;max-width:560px;}
.at{font-size:12.5px;padding:7px 14px;border-radius:999px;background:var(--skybg);border:1px solid rgba(31,162,222,.3);color:var(--skydk);opacity:0;animation:popIn .4s ease forwards;}
.at b{color:var(--ink);}
@keyframes popIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ---------- emotions view ---------- */
.emview{max-width:820px;margin:0 auto;padding:60px 24px 80px;text-align:center;}
.context{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--gray);border:1px solid var(--rule);border-radius:999px;padding:7px 16px;background:#fff;}
.understood{margin-top:20px;background:var(--cardgray);border-radius:14px;padding:16px 18px;}
.understood .uh{font-size:11.5px;font-weight:900;letter-spacing:.18em;color:var(--skydk);text-transform:uppercase;margin-bottom:10px;}
.uchips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.uchip{font-size:12.5px;background:#fff;border:1px solid var(--rule);border-radius:999px;padding:6px 13px;color:var(--gray);}
.uchip b{color:var(--ink);}
.emview h2{margin-top:34px;font-size:clamp(26px,4vw,38px);line-height:1.3;}
.emview .sub{margin-top:10px;color:var(--gray);font-size:14.5px;}
.egrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:34px;}
@media(max-width:640px){.egrid{grid-template-columns:1fr;}}
.emo{border:none;border-radius:14px;padding:26px 20px;text-align:left;font-size:15.5px;font-weight:700;line-height:1.55;transition:.18s;color:var(--ink);}
.emo.g{background:var(--cardgray);}
.emo.b{background:var(--beige);}
.emo.s{background:var(--sky);color:#fff;}
.emo:hover{transform:translateY(-4px);box-shadow:0 12px 26px rgba(20,20,20,.14);}
.emo .em{font-size:24px;display:block;margin-bottom:10px;}
html[lang="en"] .emo{font-size:14px;}
.em-actions{margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.back-link{background:none;border:none;color:var(--gray);font-size:13.5px;display:inline-flex;align-items:center;gap:6px;padding:6px 4px;}
.back-link:hover{color:var(--ink);}

/* ---------- detail view ---------- */
.detail{padding:36px 0 70px;}
.detail-hero{border-radius:20px;background:linear-gradient(150deg,#141414,#333);color:#fff;padding:40px 36px;margin-top:16px;position:relative;overflow:hidden;}
.detail-hero:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(31,162,222,.14) 1px,transparent 1px),linear-gradient(90deg,rgba(31,162,222,.14) 1px,transparent 1px);background-size:36px 36px;mask-image:radial-gradient(60% 100% at 85% 0%,#000,transparent);}
.detail-hero>*{position:relative;z-index:2;}
@media(max-width:640px){.detail-hero{padding:28px 22px;}}
.dh-region{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#fff;background:var(--sky);border-radius:999px;padding:6px 15px;}
.detail-hero h1{margin-top:16px;font-size:clamp(24px,4vw,40px);line-height:1.32;color:#fff;}
.dh-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px;}
.dh-tags span{font-size:12px;border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:5px 13px;color:rgba(255,255,255,.85);}
.demo-note{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#8a6d1f;background:#fdf6df;border:1px solid #ecd9a0;border-radius:999px;padding:6px 14px;margin-top:18px;}

.cols{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:18px;align-items:start;}
@media(max-width:820px){.cols{grid-template-columns:1fr;}}
.panel{background:#fff;border:1px solid var(--rule);border-radius:18px;padding:26px 24px;margin-bottom:18px;}
.panel h3{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px;}
.panel .pdesc{font-size:13px;color:var(--gray);margin-top:4px;}
.story-hero{background:var(--beige);border-radius:18px;padding:30px 28px;margin-bottom:18px;}
.story-hero .sk{font-size:11.5px;font-weight:900;letter-spacing:.2em;color:var(--skydk);text-transform:uppercase;}
.story-hero h2{margin-top:12px;font-size:clamp(21px,3vw,29px);line-height:1.42;}
.story-hero .body{margin-top:16px;font-size:14.5px;line-height:2;color:#4c463b;}
.lbox{margin-top:20px;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:15px 17px;}
.lbox .ll{font-size:11.5px;font-weight:900;color:var(--gray);letter-spacing:.08em;margin-bottom:6px;}
.lbox .ltxt{font-size:13px;color:var(--gray);}

.rnode{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule);}
.rnode:last-child{border-bottom:none;}
.rpin{flex-shrink:0;width:34px;height:34px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:'Black Han Sans';font-size:14px;}
.rnode:nth-child(even) .rpin{background:var(--sky);}
.rinfo b{font-size:14.5px;font-weight:900;}
.rinfo .addr{font-size:12px;color:var(--lgray);}
.rinfo p{font-size:13px;color:var(--gray);margin-top:6px;line-height:1.75;}
.rimg{width:100%;height:130px;border-radius:10px;background:var(--cardgray) center/cover no-repeat;margin-top:10px;display:none;}
.rimg.show{display:block;}
#map{width:100%;height:340px;border-radius:14px;border:2px solid var(--ink);margin-top:16px;background:var(--cardgray);display:grid;place-items:center;color:var(--lgray);font-size:13.5px;text-align:center;padding:0 20px;}

/* transport */
.tp{background:#fff;border:2px solid var(--ink);border-radius:18px;overflow:hidden;box-shadow:8px 8px 0 var(--skybg);margin-bottom:18px;}
.tp-head{background:var(--ink);color:#fff;padding:15px 20px;}
.tp-head h3{font-size:14px;font-weight:700;color:#fff;}
.tp-ctx{display:flex;gap:12px;font-size:11.5px;color:#b9b9b9;margin-top:4px;}
.wx-row{display:flex;gap:7px;flex-wrap:wrap;padding:14px 18px 0;align-items:center;}
.wx-row .wl{font-size:11.5px;color:var(--gray);margin-right:2px;}
.wx-btn{font-size:12px;border:1px solid var(--rule);border-radius:999px;background:#fff;color:var(--gray);padding:6px 13px;transition:.15s;}
.wx-btn.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.tp-best{margin:14px 18px;background:var(--skybg);border:1px solid rgba(31,162,222,.3);border-radius:13px;padding:16px 17px;}
.tp-best .badge{display:inline-block;font-size:10.5px;font-weight:900;letter-spacing:.06em;background:var(--sky);color:#fff;border-radius:6px;padding:3px 9px;}
.tp-best .bmode{font-size:16px;font-weight:900;margin-top:8px;}
.tp-best .binfo{font-size:13px;color:var(--gray);margin-top:2px;}
.tp-best .breason{font-size:12.5px;color:var(--skydk);margin-top:8px;}
.tp-opt{display:flex;justify-content:space-between;gap:10px;padding:12px 18px;border-top:1px solid var(--rule);font-size:13px;}
.tp-opt .om{font-weight:700;}
.tp-opt .oc{font-weight:900;white-space:nowrap;}
.tp-opt .ot{color:var(--gray);flex:1;text-align:right;}

/* passport */
.pp{background:linear-gradient(160deg,#141414,#26313a);color:#fff;border-radius:18px;padding:26px 24px;margin-bottom:18px;}
.pp h3{color:#fff;font-size:16px;font-weight:900;}
.pp .psub{font-size:12.5px;color:rgba(255,255,255,.55);margin:4px 0 14px;}
.progress{height:7px;border-radius:99px;background:rgba(255,255,255,.15);overflow:hidden;margin-bottom:8px;}
.progress span{display:block;height:100%;background:var(--sky);transition:width .4s;}
.pp-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.pp-row:last-child{border-bottom:none;}
.pp-row .nm{font-size:13.5px;font-weight:700;color:rgba(255,255,255,.75);}
.pp-row .nm.done{color:#7cd0f7;}
.pp-btn{background:rgba(31,162,222,.2);border:1px solid rgba(31,162,222,.45);color:#7cd0f7;border-radius:8px;font-size:12px;padding:6px 13px;}
.pp-check{color:#7cd0f7;font-size:18px;}
.textbook-panel .tb{font-size:13.5px;color:var(--gray);line-height:1.9;}
.btn-wide{width:100%;border:none;border-radius:13px;background:var(--sky);color:#fff;font-size:14.5px;font-weight:700;padding:15px;transition:.2s;}
.btn-wide:hover{background:#3db4ea;}
.btn-wide.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--rule);margin-top:10px;}
.btn-wide.ghost:hover{border-color:var(--ink);}

/* overlay + toast */
.overlay{position:fixed;inset:0;background:rgba(10,10,10,.55);z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;}
.complete-card{background:#fff;border-radius:22px;max-width:420px;width:100%;padding:38px 30px;text-align:center;border:2px solid var(--ink);box-shadow:10px 10px 0 var(--sky);}
.cc-seal{width:70px;height:70px;border-radius:50%;background:var(--skybg);display:grid;place-items:center;font-size:32px;margin:0 auto 16px;}
.complete-card h2{font-size:24px;}
.complete-card p{font-size:14px;color:var(--gray);margin-top:6px;}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13.5px;padding:12px 20px;border-radius:999px;z-index:95;display:flex;gap:8px;align-items:center;box-shadow:0 10px 30px rgba(0,0,0,.25);}

.footer{border-top:1px solid var(--rule);padding:34px 0;margin-top:20px;}
.footer .ft{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--gray);}
.footer b{color:var(--ink);}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>

<header class="topbar"><div class="wrap row">
  <button class="brand" id="brandBtn"><span class="mk">L</span><b data-i18n="brand">로컬 링크</b></button>
  <div class="top-actions">
    <button class="btn-new" id="newSearchBtn" data-i18n="newSearch">새로 검색</button>
    <div class="lang" role="group" aria-label="Language">
      <button id="btnKo" class="on" aria-pressed="true">KO</button>
      <button id="btnEn" aria-pressed="false">EN</button>
    </div>
  </div>
</div></header>

<!-- LANDING -->
<section class="view on" id="view-landing">
  <div class="hero">
    <div class="hero-grid-bg"></div>
    <span class="pill"><span class="d"></span><span data-i18n="pill">AI 역사 여행 큐레이터</span></span>
    <h1 class="disp" data-i18n="heroH1">역사를 <span class="sky">보는</span> 여행에서,<br/>역사 <span class="sky">속을 걷는</span> 여행으로</h1>
    <p class="sub" data-i18n="heroSub">동행·기간·분위기를 자유롭게 적어보세요. 감정을 고르면 AI가 이야기를 열고, 길까지 함께 알려드려요.</p>
    <div class="searchbox">
      <input type="text" id="searchInput" placeholder="예) 1박2일 친구와 깊이 있는 역사 여행" aria-label="여행 조건 입력"/>
      <button class="go" id="goBtn" data-i18n="searchGo">검색</button>
    </div>
    <p class="search-hint" data-i18n="searchHint">✦ 어떻게 쓸지 모르겠다면 아래 예시를 눌러보세요</p>
    <div class="chips" id="quickChips"></div>
  </div>
</section>

<!-- LOADING (searching / generating 겸용) -->
<section class="view" id="view-loading">
  <div class="loading">
    <div class="ring"></div>
    <p class="kq" id="loadingQ"></p>
    <p class="sub" id="loadingSub"></p>
    <div class="tags" id="loadingTags"></div>
  </div>
</section>

<!-- EMOTIONS -->
<section class="view" id="view-emotions">
  <div class="emview">
    <span class="context" id="emContext"></span>
    <div class="understood" id="understood" style="display:none;">
      <div class="uh" data-i18n="understoodH">이렇게 이해했어요</div>
      <div class="uchips" id="uchips"></div>
    </div>
    <h2 class="disp" data-i18n="emH2">어떤 감정으로<br/>역사를 만나볼까요?</h2>
    <p class="sub" data-i18n="emSub">같은 역사도, 감정에 따라 다른 이야기와 장소로 안내해요.</p>
    <div class="egrid" id="egrid"></div>
    <div class="em-actions">
      <button class="chip" id="reshuffle" data-i18n="reshuffle">🔀 다른 감정 보기</button>
      <button class="back-link" id="backToLanding" data-i18n="backSearch">← 검색으로 돌아가기</button>
    </div>
  </div>
</section>

<!-- DETAIL -->
<section class="view" id="view-detail">
  <div class="wrap detail">
    <button class="back-link" id="backToEmotions" data-i18n="backEmotion">← 다른 감정 선택</button>
    <div id="detailBody"></div>
  </div>
</section>

<div id="overlayRoot"></div>
<div id="toastRoot"></div>

<footer class="footer"><div class="wrap ft">
  <span><b data-i18n="brand2">로컬 링크</b> · AI History Curator</span>
  <span data-i18n="footR">감정으로 진입 → 서사로 몰입 → 교과서 연결 → 즉시 출발</span>
</div></footer>

<script>
/* ================= i18n ================= */
const DICT={
  ko:{
    brand:"로컬 링크",brand2:"로컬 링크",newSearch:"새로 검색",
    pill:"AI 역사 여행 큐레이터",
    heroH1:'역사를 <span class="sky">보는</span> 여행에서,<br/>역사 <span class="sky">속을 걷는</span> 여행으로',
    heroSub:"동행·기간·분위기를 자유롭게 적어보세요. 감정을 고르면 AI가 이야기를 열고, 길까지 함께 알려드려요.",
    searchPh:"예) 1박2일 친구와 깊이 있는 역사 여행",searchGo:"검색",
    searchHint:"✦ 어떻게 쓸지 모르겠다면 아래 예시를 눌러보세요",
    chips:["1박2일 친구와 깊이 있는 역사 여행","혼자 가볍게 감성 산책","가족이랑 당일치기 교육 여행","연인과 사진 찍기 좋은 역사 투어"],
    searching:"AI가 문장 속 의도를 읽고, 어울리는 역사를 찾고 있어요…",
    searchingAll:"전체 역사를 살펴보는 중…",
    generatingSub:"감정에 맞는 이야기와 장소를 준비하고 있어요…",

let lang="ko";
const $=(s)=>document.querySelector(s);
const $$=(s)=>document.querySelectorAll(s);
const D=()=>DICT[lang];
const esc=(s)=>{const d=document.createElement("div");d.textContent=String(s??"");return d.innerHTML;};

/* ================= state ================= */
let state={query:"",detected:[],emotion:"",course:null,isDemo:false,spots:[],stamps:[],weather:"clear",dir:null};

/* ================= view router ================= */
function setView(id){
  $$(".view").forEach(v=>v.classList.remove("on"));
  $("#view-"+id).classList.add("on");
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ================= intent parsing (STEP 0) ================= */
function parseQuery(q){
  const d=D(),out=[];
  const scan=(map,dim)=>{for(const k in map){if(q.toLowerCase().includes(k)){out.push({dim,label:map[k]});break;}}};
  scan(d.whoMap,"who");scan(d.whenMap,"when");scan(d.moodMap,"mood");
  return out;
}

/* ================= statics render ================= */
function renderStatics(){
  const d=D();
  $$("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(typeof d[k]==="string")el.innerHTML=d[k];});
  $("#searchInput").placeholder=d.searchPh;
  $("#quickChips").innerHTML=d.chips.map(c=>`<button class="chip">↳ ${c}</button>`).join("");
  $$("#quickChips .chip").forEach(b=>b.addEventListener("click",()=>{$("#searchInput").value=b.textContent.replace(/^↳\s*/,"");doSearch();}));
}
function applyLang(next){
  lang=next;document.documentElement.lang=next;
  $("#btnKo").classList.toggle("on",next==="ko");$("#btnEn").classList.toggle("on",next==="en");
  $("#btnKo").setAttribute("aria-pressed",next==="ko");$("#btnEn").setAttribute("aria-pressed",next==="en");
  renderStatics();
}

/* ================= flow: landing → searching → emotions ================= */
function doSearch(){
  const q=$("#searchInput").value.trim();
  if(!q){$("#searchInput").focus();return;}
  state.query=q;state.detected=parseQuery(q);
  const d=D();
  $("#loadingQ").textContent=`"${q}"`;
  $("#loadingSub").textContent=d.searching;
  $("#loadingTags").innerHTML=(state.detected.length?state.detected:[null]).map((t,i)=>
    t?`<span class="at" style="animation-delay:${.2+i*.15}s">${d.dims[t.dim]} · <b>${esc(t.label)}</b></span>`
     :`<span class="at" style="animation-delay:.3s">${d.searchingAll}</span>`).join("");
  setView("loading");
  setTimeout(showEmotions,1600);
}
function showEmotions(){
  const d=D();
  $("#emContext").textContent=`◎ "${state.query}"`;
  const u=$("#understood");
  if(state.detected.length){
    u.style.display="block";
    $("#uchips").innerHTML=state.detected.map(t=>`<span class="uchip">${d.dims[t.dim]} · <b>${esc(t.label)}</b></span>`).join("");
  }else u.style.display="none";
  renderEgrid();
  setView("emotions");
}
function renderEgrid(){
  const d=D();
  const idx=[...Array(9).keys()].sort(()=>Math.random()-.5).slice(0,3);
  $("#egrid").innerHTML=idx.map(i=>{const[em,t,cls]=d.emotions[i];
    return `<button class="emo ${cls}" data-pick="${i}"><span class="em">${em}</span><span>${t}</span></button>`;}).join("");
  $$("#egrid [data-pick]").forEach(b=>b.addEventListener("click",()=>pickEmotion(+b.dataset.pick)));
}

  ],

const SEOUL={x:126.9780,y:37.5665};

async function pickEmotion(i){
  const d=D();
  const emoText=d.emotions[i][1].replace(/<br\/>/g," ");
  state.emotion=emoText;
  $("#loadingQ").textContent=`${d.emotions[i][0]} ${emoText}`;
  $("#loadingSub").textContent=d.generatingSub;
  $("#loadingTags").innerHTML="";
  setView("loading");

  let course,isDemo=false;
  try{
    const r=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query:state.query,emotion:emoText,lang})});
    if(!r.ok)throw 0;
    course=await r.json();
    if(!course.title||!Array.isArray(course.spots))throw 0;
  }catch{course=DEMO;isDemo=true;}

  let spots=course.spots.slice(0,4);
  if(!isDemo){
    spots=await Promise.all(spots.map(async(sp)=>{
      try{
        const r=await fetch(`/api/tour?op=keyword&keyword=${encodeURIComponent(sp.searchKeyword||sp.name)}&lang=${lang}`);
        const {items=[]}=await r.json();
        const hit=items.find(it=>!isNaN(it.mapX))||{};
        return {...sp,...hit,title:hit.title||sp.name};
      }catch{return {...sp,title:sp.name};}
    }));
  }
  state.course=course;state.isDemo=isDemo;state.spots=spots;
  state.stamps=spots.map(()=>false);state.dir=null;

  renderDetail();
  setView("detail");

  // 길찾기 (부가)
  const mappable=spots.filter(s=>!isNaN(parseFloat(s.mapX)));
  if(mappable.length){
    try{
      const t=mappable[0];
      const r=await fetch(`/api/directions?originX=${SEOUL.x}&originY=${SEOUL.y}&destX=${t.mapX}&destY=${t.mapY}`);
      const j=await r.json();
      if(j.found){state.dir=j;renderTransport();}
    }catch{}
  }
}

function renderTransport(){

/* ================= Kakao Map ================= */
let kakaoReady=null;
function loadKakao(){
  if(kakaoReady)return kakaoReady;
  kakaoReady=fetch("/api/config").then(r=>r.json()).then(({kakaoJsKey})=>{
    if(!kakaoJsKey)throw new Error("no-key");
    return new Promise((res,rej)=>{
      const s=document.createElement("script");
      s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${kakaoJsKey}&autoload=false`;
      s.onload=()=>kakao.maps.load(res);s.onerror=rej;
      document.head.appendChild(s);
    });
  });
  return kakaoReady;
}
function drawMap(spots){
  loadKakao().then(()=>{
    const el=$("#map");if(!el)return;
    el.textContent="";
    const map=new kakao.maps.Map(el,{center:new kakao.maps.LatLng(spots[0].mapY,spots[0].mapX),level:8});
    const bounds=new kakao.maps.LatLngBounds();
    spots.forEach((s,i)=>{
      const pos=new kakao.maps.LatLng(s.mapY,s.mapX);
      new kakao.maps.Marker({map,position:pos});
      new kakao.maps.CustomOverlay({map,position:pos,yAnchor:2.5,
        content:`<div style="background:#141414;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;font-family:'Noto Sans KR'">${i+1}. ${s.title}</div>`});
      bounds.extend(pos);
    });
    if(spots.length>1)map.setBounds(bounds,60,60,60,60);
  }).catch(()=>{});
}

/* ================= wire up ================= */
$("#goBtn").addEventListener("click",doSearch);
$("#searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
$("#brandBtn").addEventListener("click",goHome);
$("#newSearchBtn").addEventListener("click",goHome);
$("#reshuffle").addEventListener("click",renderEgrid);
$("#backToLanding").addEventListener("click",goHome);
$("#backToEmotions").addEventListener("click",()=>{renderEgrid();setView("emotions");});
$("#btnKo").addEventListener("click",()=>applyLang("ko"));
$("#btnEn").addEventListener("click",()=>applyLang("en"));
renderStatics();
</script>
